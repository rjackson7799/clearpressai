<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>新規コンテンツリクエスト — ClearPress AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ffffff;
    --surface: #f8fafc;
    --surface-2: #f1f5f9;
    --border: #e2e8f0;
    --border-strong: #cbd5e1;
    --text: #0f172a;
    --text-2: #334155;
    --text-3: #64748b;
    --text-4: #94a3b8;
    --blue: #3b82f6;
    --blue-600: #2563eb;
    --blue-50: #eff6ff;
    --blue-100: #dbeafe;
    --green: #16a34a;
    --green-50: #f0fdf4;
    --amber: #f59e0b;
    --amber-50: #fffbeb;
    --orange: #ea580c;
    --orange-50: #fff7ed;
    --red: #dc2626;
    --red-50: #fef2f2;
    --red-100: #fee2e2;
    --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.05);
    --shadow-pop: 0 4px 12px rgba(15, 23, 42, 0.06), 0 2px 4px rgba(15, 23, 42, 0.04);
    --radius: 8px;
    --radius-sm: 6px;
    --radius-lg: 12px;
    --font-en: 'Inter', system-ui, sans-serif;
    --font-jp: 'Noto Sans JP', 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-jp);
    color: var(--text);
    background: var(--bg);
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: 'palt' 1;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; color: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 5px; border: 2px solid #fff; }
  ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

  /* ---------- layout shell ---------- */
  .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .sidebar {
    background: #fff;
    border-right: 1px solid var(--border);
    padding: 18px 12px 16px;
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
  }
  .logo { display: flex; align-items: center; gap: 9px; padding: 6px 10px 18px; }
  .logo-mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
    display: grid; place-items: center;
    color: #fff; font-family: var(--font-en); font-weight: 700; font-size: 14px;
    box-shadow: 0 1px 2px rgba(37, 99, 235, 0.3), inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .logo-name { font-family: var(--font-en); font-weight: 600; font-size: 14.5px; letter-spacing: -0.01em; color: var(--text); }
  .logo-name .ai { color: var(--text-3); font-weight: 500; margin-left: 4px; }

  .nav-section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-4); font-weight: 600; font-family: var(--font-en);
    padding: 14px 10px 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 6px;
    color: var(--text-2); font-size: 13.5px; font-weight: 500;
    cursor: pointer; transition: background 0.12s;
    width: 100%; text-align: left; white-space: nowrap;
  }
  .nav-item:hover { background: var(--surface); }
  .nav-item.active { background: var(--surface-2); color: var(--text); }
  .nav-item .icon { color: var(--text-3); flex-shrink: 0; }
  .nav-item.active .icon { color: var(--text); }
  .nav-count {
    margin-left: auto; font-family: var(--font-en); font-size: 11;
    color: var(--text-3); font-size: 11px;
  }
  .nav-spacer { flex: 1; }
  .profile {
    border-top: 1px solid var(--border);
    margin: 0 -12px; padding: 10px 14px 4px;
    display: flex; align-items: center; gap: 10px;
  }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #fda4af, #e11d48);
    color: #fff; display: grid; place-items: center;
    font-family: var(--font-en); font-weight: 600; font-size: 12px;
    flex-shrink: 0;
  }
  .profile-meta { min-width: 0; flex: 1; line-height: 1.25; }
  .profile-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .profile-role { font-size: 11.5px; color: var(--text-3); }
  .profile-menu { color: var(--text-4); padding: 4px; border-radius: 4px; }
  .profile-menu:hover { background: var(--surface); color: var(--text-2); }

  /* ---------- header ---------- */
  .main { display: flex; flex-direction: column; min-width: 0; }
  .header {
    height: 56px; border-bottom: 1px solid var(--border); background: #fff;
    display: flex; align-items: center; padding: 0 28px; gap: 16px;
    position: sticky; top: 0; z-index: 20;
  }
  .crumbs { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text-3); flex: 1; min-width: 0; }
  .crumb { color: var(--text-3); }
  .crumb:hover { color: var(--text); }
  .crumb.current { color: var(--text); font-weight: 500; }
  .crumb-sep { color: var(--text-4); }

  .lang-toggle {
    display: inline-flex; background: var(--surface-2);
    border-radius: 999px; padding: 3px; border: 1px solid var(--border);
  }
  .lang-toggle button {
    padding: 4px 12px; font-size: 12.5px; font-weight: 500;
    border-radius: 999px; color: var(--text-3);
    transition: all 0.12s; font-family: var(--font-en);
  }
  .lang-toggle button.jp { font-family: var(--font-jp); }
  .lang-toggle button.active {
    background: var(--blue); color: #fff;
    box-shadow: 0 1px 2px rgba(37, 99, 235, 0.3);
  }

  .header-icon-btn {
    width: 32px; height: 32px; border-radius: 6px;
    display: grid; place-items: center; color: var(--text-3); position: relative;
  }
  .header-icon-btn:hover { background: var(--surface); color: var(--text); }
  .header-icon-btn .dot {
    position: absolute; top: 6px; right: 7px;
    width: 7px; height: 7px; background: var(--blue);
    border-radius: 50%; border: 1.5px solid #fff;
  }
  .header-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #fda4af, #e11d48);
    color: #fff; display: grid; place-items: center;
    font-family: var(--font-en); font-weight: 600; font-size: 12px;
  }

  /* ---------- content shell ---------- */
  .content {
    max-width: 1280px; width: 100%;
    margin: 0 auto; padding: 28px 32px 96px;
  }
  .page-head { margin-bottom: 28px; }
  .page-title {
    font-size: 24px; font-weight: 700; color: var(--text);
    line-height: 1.25; letter-spacing: -0.005em; margin: 0 0 6px;
  }
  .page-title .romaji {
    font-family: var(--font-en); font-size: 14px; font-weight: 500;
    color: var(--text-3); margin-left: 10px; letter-spacing: 0;
  }
  .page-sub { font-size: 13px; color: var(--text-3); line-height: 1.6; }
  .page-sub .url-chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--font-mono); font-size: 11.5px;
    background: var(--surface-2); border: 1px solid var(--border);
    padding: 1px 7px; border-radius: 4px; color: var(--text-2);
    margin-left: 8px;
  }

  /* ---------- buttons ---------- */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 6px;
    font-size: 13px; font-weight: 500;
    border: 1px solid var(--border); background: #fff;
    color: var(--text-2); transition: all 0.1s; white-space: nowrap;
  }
  .btn:hover:not(.disabled) { background: var(--surface); border-color: var(--border-strong); color: var(--text); }
  .btn.primary {
    background: var(--blue); color: #fff; border-color: var(--blue);
    box-shadow: 0 1px 2px rgba(37, 99, 235, 0.25);
  }
  .btn.primary:hover:not(.disabled) { background: var(--blue-600); border-color: var(--blue-600); }
  .btn.primary.lg {
    padding: 12px 16px; font-size: 14px; font-weight: 600;
    width: 100%; justify-content: center; gap: 8px;
    border-radius: 8px;
  }
  .btn.primary.lg .icon-tail { margin-left: auto; }
  .btn.disabled {
    background: var(--surface-2); color: var(--text-4); border-color: var(--border);
    box-shadow: none; cursor: not-allowed;
  }
  .btn.primary.lg.disabled { background: var(--surface-2); color: var(--text-4); border-color: var(--border); }

  /* ---------- two-column layout ---------- */
  .nr-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 420px;
    gap: 28px;
    align-items: start;
  }
  .nr-form { display: flex; flex-direction: column; gap: 20px; min-width: 0; }

  /* ---------- form card ---------- */
  .fc {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .fc-head {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #fcfdff 0%, #ffffff 100%);
  }
  .fc-step {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-3);
    font-family: var(--font-en); font-weight: 600; font-size: 11.5px;
    display: grid; place-items: center;
    flex-shrink: 0; margin-top: 2px;
  }
  .fc-titles { flex: 1; min-width: 0; }
  .fc-title {
    margin: 0; font-size: 14.5px; font-weight: 600; color: var(--text);
    letter-spacing: -0.003em; display: flex; align-items: baseline; gap: 8px;
    flex-wrap: wrap;
  }
  .fc-en {
    font-family: var(--font-en); font-size: 12px; font-weight: 500;
    color: var(--text-3); letter-spacing: 0;
  }
  .fc-helper { margin-top: 3px; font-size: 12.5px; color: var(--text-3); line-height: 1.55; }
  .fc-action { margin-left: auto; }
  .fc-body { padding: 18px 20px 20px; }

  .collapse-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 8px; font-size: 12px; color: var(--text-3);
    border-radius: 5px; font-weight: 500;
  }
  .collapse-btn:hover { background: var(--surface); color: var(--text-2); }

  /* ---------- fields ---------- */
  .field-grid { display: grid; gap: 14px; }
  .field-grid.two { grid-template-columns: minmax(0, 1fr) minmax(0, 1.3fr); }
  .field { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .field-label {
    font-size: 12px; font-weight: 600; color: var(--text-2);
    letter-spacing: -0.003em;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .field-label.sm { font-size: 11.5px; color: var(--text-3); font-weight: 500; text-transform: none; }
  .field-label .req { color: var(--red); margin-left: 2px; }
  .field-hint { font-size: 11.5px; color: var(--text-3); }

  .input-wrap { position: relative; }
  .input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    background: #fff;
    color: var(--text);
    transition: border-color .1s, box-shadow .1s;
  }
  .input:hover { border-color: var(--border-strong); }
  .input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
  .input.flush { border-color: transparent; background: transparent; padding-left: 0; }
  .input.flush:hover { background: var(--surface); border-color: var(--border); padding-left: 8px; }
  .input.flush:focus { background: #fff; border-color: var(--blue); padding-left: 8px; }

  .textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px; line-height: 1.7;
    background: #fff; color: var(--text);
    resize: vertical;
    min-height: 120px;
    transition: border-color .1s, box-shadow .1s;
  }
  .textarea:hover { border-color: var(--border-strong); }
  .textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
  .textarea.sm { min-height: 64px; font-size: 12.5px; }

  .textarea-wrap { display: flex; flex-direction: column; gap: 8px; }
  .textarea-foot {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11.5px;
  }
  .ta-warn {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--amber); font-weight: 500;
  }
  .ta-warn strong { font-family: var(--font-en); color: #b45309; }
  .ta-ok {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--green); font-weight: 500;
  }
  .char-count {
    font-family: var(--font-en); color: var(--text-3); font-size: 11.5px;
  }
  .char-count .low { color: var(--amber); font-weight: 600; }

  /* ---------- combobox ---------- */
  .combobox {
    width: 100%;
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px 7px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    text-align: left;
    transition: border-color .1s, box-shadow .1s;
    min-height: 38px;
  }
  .combobox:hover { border-color: var(--border-strong); background: #fcfdff; }
  .cb-avatar {
    width: 24px; height: 24px; border-radius: 5px;
    background: linear-gradient(135deg, #3b82f6, #1e40af);
    color: #fff; font-size: 11.5px; font-weight: 600;
    display: grid; place-items: center; flex-shrink: 0;
  }
  .cb-avatar.tiny { width: 18px; height: 18px; border-radius: 4px; font-size: 9.5px; }
  .cb-main { flex: 1; min-width: 0; line-height: 1.25; }
  .cb-name { display: block; font-size: 13px; font-weight: 500; color: var(--text); }
  .cb-sub { display: block; font-size: 11px; color: var(--text-3); font-family: var(--font-en); margin-top: 1px; }

  /* ---------- content type grid ---------- */
  .ct-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }
  .ct-card {
    position: relative;
    display: flex; flex-direction: column; align-items: flex-start;
    gap: 6px;
    padding: 14px 14px 12px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: left;
    transition: all 0.1s;
    min-height: 92px;
  }
  .ct-card:hover { border-color: var(--border-strong); background: #fcfdff; }
  .ct-card.selected {
    border-color: var(--blue);
    background: var(--blue-50);
    box-shadow: 0 0 0 1px var(--blue) inset, 0 1px 2px rgba(37,99,235,0.12);
  }
  .ct-icon {
    color: var(--text-3);
    width: 30px; height: 30px;
    border-radius: 6px;
    background: var(--surface-2);
    display: grid; place-items: center;
    margin-bottom: 2px;
  }
  .ct-card.selected .ct-icon {
    background: #fff;
    color: var(--blue-600);
    box-shadow: 0 1px 2px rgba(37,99,235,0.1);
  }
  .ct-label {
    font-size: 13px; font-weight: 600; color: var(--text);
    line-height: 1.3;
  }
  .ct-en {
    font-family: var(--font-en); font-size: 11px;
    color: var(--text-3); font-weight: 500;
    line-height: 1.2;
  }
  .ct-card.selected .ct-en { color: var(--blue-600); }
  .ct-check {
    position: absolute; top: 10px; right: 10px;
    width: 18px; height: 18px;
    border-radius: 50%; background: var(--blue);
    color: #fff; display: grid; place-items: center;
    box-shadow: 0 1px 2px rgba(37,99,235,0.3);
  }

  /* ---------- urgency pills ---------- */
  .urg-row {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }
  .urg-pill {
    position: relative;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: #fff;
    transition: all 0.1s;
  }
  .urg-pill:hover { border-color: var(--border-strong); background: #fcfdff; }
  .urg-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--text-4);
    flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(148,163,184,0.18);
  }
  .urg-main { display: flex; flex-direction: column; line-height: 1.2; flex: 1; min-width: 0; text-align: left; }
  .urg-label { font-size: 13px; font-weight: 600; color: var(--text); }
  .urg-sla { font-size: 11px; color: var(--text-3); font-family: var(--font-en); margin-top: 2px; }

  .urg-pill.tone-gray .urg-dot { background: #94a3b8; box-shadow: 0 0 0 3px rgba(148,163,184,0.18); }
  .urg-pill.tone-amber .urg-dot { background: var(--amber); box-shadow: 0 0 0 3px rgba(245,158,11,0.18); }
  .urg-pill.tone-orange .urg-dot { background: var(--orange); box-shadow: 0 0 0 3px rgba(234,88,12,0.18); }
  .urg-pill.tone-red .urg-dot { background: var(--red); box-shadow: 0 0 0 3px rgba(220,38,38,0.18); }

  .urg-pill.selected.tone-gray   { border-color: #94a3b8; background: var(--surface-2); }
  .urg-pill.selected.tone-amber  { border-color: var(--amber); background: var(--amber-50); }
  .urg-pill.selected.tone-amber .urg-label { color: #92400e; }
  .urg-pill.selected.tone-orange { border-color: var(--orange); background: var(--orange-50); }
  .urg-pill.selected.tone-orange .urg-label { color: #9a3412; }
  .urg-pill.selected.tone-red    { border-color: var(--red); background: var(--red-50); }
  .urg-pill.selected.tone-red .urg-label { color: #991b1b; }

  .urg-pill.pulse .urg-dot {
    animation: urg-pulse 1.6s ease-in-out infinite;
  }
  @keyframes urg-pulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(220,38,38,0.18); }
    50% { box-shadow: 0 0 0 6px rgba(220,38,38,0.0); }
  }

  /* ---------- structured fields ---------- */
  .sf-stack { display: flex; flex-direction: column; gap: 22px; }
  .sf-block { display: flex; flex-direction: column; gap: 8px; }
  .sf-block-head {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; font-weight: 600; color: var(--text-2);
  }
  .sf-block-label { display: inline-flex; align-items: baseline; gap: 6px; }
  .sf-en { font-family: var(--font-en); font-size: 11px; color: var(--text-3); font-weight: 500; }
  .sf-block-meta {
    margin-left: auto;
    font-family: var(--font-en); font-size: 11px;
    color: var(--text-3); font-weight: 500;
    padding: 1px 7px; background: var(--surface-2); border-radius: 999px;
  }
  .sf-block-meta.hint { font-family: var(--font-jp); background: transparent; padding: 0; }

  .repeat-list {
    display: flex; flex-direction: column;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: #fff;
    overflow: hidden;
  }
  .repeat-row {
    display: grid;
    grid-template-columns: 28px 1fr 28px;
    align-items: center;
    gap: 8px;
    padding: 4px 10px 4px 4px;
    border-bottom: 1px solid var(--border);
    transition: background .08s;
  }
  .repeat-row:last-child { border-bottom: none; }
  .repeat-row:hover { background: #fcfdff; }
  .repeat-index {
    width: 22px; height: 22px;
    border-radius: 5px;
    background: var(--surface-2);
    font-family: var(--font-en); font-size: 11px; font-weight: 600;
    color: var(--text-3);
    display: grid; place-items: center;
    margin-left: 4px;
  }
  .repeat-index.num { font-size: 10.5px; }
  .row-del {
    width: 24px; height: 24px; border-radius: 5px;
    color: var(--text-4);
    display: grid; place-items: center;
    opacity: 0; transition: all .1s;
  }
  .row-del.lg {
    width: auto; height: auto; padding: 4px 8px;
    font-size: 11.5px; gap: 4px; opacity: 1;
    display: inline-flex; align-items: center;
  }
  .repeat-row:hover .row-del { opacity: 1; }
  .row-del:hover { background: var(--red-50); color: var(--red); }

  .add-row {
    align-self: flex-start;
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 10px;
    font-size: 12px; font-weight: 500;
    color: var(--blue-600);
    border-radius: 5px;
  }
  .add-row:hover { background: var(--blue-50); }

  .quote-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px 10px;
    background: #fff;
    position: relative;
  }
  .quote-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.3fr); gap: 10px; }
  .quote-foot { display: flex; justify-content: flex-end; margin-top: 4px; }

  /* ---------- variation axis ---------- */
  .va-row {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }
  .va-card {
    position: relative;
    display: flex; flex-direction: column;
    gap: 6px;
    padding: 14px 14px 13px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: left;
    transition: all 0.1s;
  }
  .va-card:hover { border-color: var(--border-strong); background: #fcfdff; }
  .va-card.selected {
    border-color: var(--blue);
    background: var(--blue-50);
    box-shadow: 0 0 0 1px var(--blue) inset;
  }
  .va-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .va-radio {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    background: #fff;
    flex-shrink: 0;
    display: grid; place-items: center;
  }
  .va-radio.on { border-color: var(--blue); }
  .va-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); }
  .va-label { font-size: 13px; font-weight: 600; color: var(--text); }
  .va-en { font-family: var(--font-en); font-size: 11px; color: var(--text-3); font-weight: 500; }
  .va-rec {
    margin-left: auto;
    font-size: 10.5px; font-weight: 600;
    color: var(--blue-600);
    background: #fff;
    border: 1px solid #bfdbfe;
    padding: 1px 6px; border-radius: 999px;
  }
  .va-card.selected .va-rec { background: #fff; }
  .va-desc {
    font-size: 11.5px; color: var(--text-3);
    line-height: 1.55; padding-left: 22px;
  }
  .va-card.selected .va-desc { color: var(--text-2); }

  /* ---------- preview panel ---------- */
  .preview { position: sticky; top: 80px; }
  .preview-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .preview-head {
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #fcfdff 0%, #ffffff 100%);
  }
  .preview-title {
    margin: 0; font-size: 13.5px; font-weight: 600;
    display: flex; align-items: baseline; gap: 8px;
  }
  .preview-en {
    font-family: var(--font-en); font-size: 11.5px; color: var(--text-3); font-weight: 500;
  }

  .preview-rows { padding: 4px 0; }
  .pv-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 14px;
    padding: 10px 18px;
    font-size: 12.5px;
    border-bottom: 1px dashed var(--border);
  }
  .pv-row:last-of-type { border-bottom: none; }
  .pv-key {
    color: var(--text-3); font-size: 11.5px; font-weight: 500;
    line-height: 1.5;
  }
  .pv-val {
    color: var(--text); font-weight: 500;
    display: flex; align-items: center; gap: 6px;
    line-height: 1.5; min-width: 0;
  }
  .pv-clamp {
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .pv-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface-2);
    color: var(--text-2);
    font-size: 11.5px; font-weight: 500;
    border: 1px solid var(--border);
  }
  .pv-chip.tone-amber { background: var(--amber-50); color: #92400e; border-color: #fde68a; }
  .pv-chip.tone-amber .urg-dot { width: 6px; height: 6px; box-shadow: none; background: var(--amber); }

  .pv-row.excerpt { grid-template-columns: 1fr; gap: 6px; }
  .pv-excerpt {
    font-size: 12px;
    color: var(--text-2);
    line-height: 1.7;
    background: var(--surface);
    border-radius: 6px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .pv-excerpt.empty { color: var(--amber); font-style: normal; background: var(--amber-50); border-color: #fde68a; }

  .pv-row.structured { grid-template-columns: 110px 1fr; }
  .pv-counts {
    display: flex; flex-wrap: wrap; gap: 4px 10px;
  }
  .pv-count {
    font-size: 11.5px; color: var(--text-3);
    display: inline-flex; gap: 4px; align-items: baseline;
  }
  .pv-count strong { font-family: var(--font-en); font-weight: 600; color: var(--text); }
  .pv-empty { color: var(--text-4); font-style: italic; font-size: 11.5px; font-weight: 400; }

  .preview-voice {
    padding: 14px 18px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .pv-voice-line {
    display: flex; align-items: center; gap: 8px;
    font-size: 12.5px; color: var(--text-2);
  }
  .pv-voice-line strong { color: var(--green); font-weight: 600; }
  .pv-voice-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 3px rgba(22,163,74,0.18);
  }
  .pv-voice-link {
    margin-left: auto;
    font-size: 11.5px; color: var(--blue-600);
    text-decoration: none; font-weight: 500;
  }
  .pv-voice-link:hover { text-decoration: underline; }
  .pv-voice-meta {
    margin-top: 6px;
    font-size: 11px; color: var(--text-3);
    font-family: var(--font-en);
    padding-left: 16px;
  }

  .preview-estimates {
    padding: 10px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  .est-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 0;
    font-size: 12px;
  }
  .est-key { display: inline-flex; align-items: center; gap: 6px; color: var(--text-3); }
  .est-val { font-family: var(--font-en); font-weight: 600; color: var(--text); font-size: 12.5px; }
  .est-val.faded { color: var(--text-3); font-weight: 500; }

  .preview-cta { padding: 14px 18px 16px; }
  .cta-wrap { position: relative; }
  .cta-meta {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-3);
    text-align: center;
  }

  .tooltip {
    position: absolute;
    left: 50%; top: -8px;
    transform: translate(-50%, -100%);
    background: #0f172a;
    color: #fff;
    font-size: 11.5px; font-weight: 500;
    padding: 8px 12px;
    border-radius: 6px;
    box-shadow: 0 4px 12px rgba(15,23,42,0.18);
    display: inline-flex; align-items: center; gap: 6px;
    white-space: nowrap;
    line-height: 1.4;
  }
  .tooltip::after {
    content: ''; position: absolute;
    left: 50%; bottom: -4px;
    transform: translateX(-50%) rotate(45deg);
    width: 8px; height: 8px;
    background: #0f172a;
  }
  .tooltip svg { color: var(--amber); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="new-request.jsx"></script>

  <script type="text/babel">
    const NR_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "state": "default",
      "language": "ja"
    }/*EDITMODE-END*/;

    function NRSidebar() {
      return (
        <aside className="sidebar">
          <div className="logo">
            <div className="logo-mark">C</div>
            <div className="logo-name">ClearPress<span className="ai">AI</span></div>
          </div>

          <div className="nav-section-label">メイン</div>
          <button className="nav-item">
            <span className="icon"><IconDashboard size={16} /></span>
            <span>ダッシュボード</span>
          </button>
          <button className="nav-item">
            <span className="icon"><IconClients size={16} /></span>
            <span>クライアント</span>
            <span className="nav-count">14</span>
          </button>
          <button className="nav-item active">
            <span className="icon"><IconProjects size={16} /></span>
            <span>プロジェクト</span>
            <span className="nav-count">32</span>
          </button>
          <button className="nav-item">
            <span className="icon"><IconSettings size={16} /></span>
            <span>設定</span>
          </button>

          <div className="nav-section-label">進行中</div>
          <button className="nav-item active" style={{ paddingLeft: 14, fontSize: 13 }}>
            <span style={{ width: 5, height: 5, borderRadius: '50%', background: '#3b82f6', flexShrink: 0 }} />
            <span style={{ overflow: 'hidden', textOverflow: 'ellipsis' }}>新規リクエスト（下書き）</span>
          </button>
          <button className="nav-item" style={{ paddingLeft: 14, fontSize: 13 }}>
            <span style={{ width: 5, height: 5, borderRadius: '50%', background: '#cbd5e1', flexShrink: 0 }} />
            <span style={{ overflow: 'hidden', textOverflow: 'ellipsis' }}>第II相試験 中間報告</span>
          </button>
          <button className="nav-item" style={{ paddingLeft: 14, fontSize: 13 }}>
            <span style={{ width: 5, height: 5, borderRadius: '50%', background: '#cbd5e1', flexShrink: 0 }} />
            <span style={{ overflow: 'hidden', textOverflow: 'ellipsis' }}>新CEO就任発表</span>
          </button>

          <div className="nav-spacer" />

          <div className="profile">
            <div className="avatar">AS</div>
            <div className="profile-meta">
              <div className="profile-name">佐藤 愛子</div>
              <div className="profile-role">アカウントマネージャー</div>
            </div>
            <button className="profile-menu"><IconMore size={14} /></button>
          </div>
        </aside>
      );
    }

    function NRHeader({ language, setLanguage }) {
      return (
        <header className="header">
          <div className="crumbs">
            <button className="crumb"><IconHome size={13} style={{ verticalAlign: '-2px' }} /></button>
            <span className="crumb-sep">/</span>
            <button className="crumb">プロジェクト</button>
            <span className="crumb-sep">/</span>
            <span className="crumb current">新規リクエスト</span>
          </div>

          <div className="lang-toggle">
            <button className={'jp' + (language === 'ja' ? ' active' : '')} onClick={() => setLanguage('ja')}>日本語</button>
            <button className={(language === 'en' ? ' active' : '')} onClick={() => setLanguage('en')}>English</button>
          </div>

          <button className="header-icon-btn"><IconSearch size={16} /></button>
          <button className="header-icon-btn">
            <IconBell size={16} />
            <span className="dot" />
          </button>

          <div className="header-avatar">AS</div>
        </header>
      );
    }

    function NRPageHeader() {
      return (
        <div className="page-head">
          <h1 className="page-title">
            新規コンテンツリクエスト
            <span className="romaji">New Content Request</span>
          </h1>
          <div className="page-sub">
            ブリーフを入力して AI に3つのドラフトを生成させます。
            <span className="url-chip">/projects/new</span>
          </div>
        </div>
      );
    }

    function NRApp() {
      const [t, setTweak] = useTweaks(NR_TWEAK_DEFAULTS);

      return (
        <>
          <div className="app">
            <NRSidebar />
            <div className="main">
              <NRHeader language={t.language} setLanguage={(v) => setTweak('language', v)} />
              <div className="content" data-screen-label="02 New Content Request">
                <NRPageHeader />
                <NewRequestPage state={t.state} />
              </div>
            </div>
          </div>

          <TweaksPanel>
            <TweakSection label="送信ボタンの状態">
              <TweakRadio
                label="State"
                value={t.state}
                options={[
                  { value: 'default', label: '入力済' },
                  { value: 'short-brief', label: 'ブリーフ短' },
                ]}
                onChange={(v) => setTweak('state', v)}
              />
            </TweakSection>
            <TweakSection label="言語">
              <TweakRadio
                label="Language"
                value={t.language}
                options={[
                  { value: 'ja', label: '日本語' },
                  { value: 'en', label: 'English' },
                ]}
                onChange={(v) => setTweak('language', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    const nrRoot = ReactDOM.createRoot(document.getElementById('root'));
    nrRoot.render(<NRApp />);
  </script>
</body>
</html>
