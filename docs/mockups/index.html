<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>ClearPress AI — 田中製薬株式会社</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ffffff;
    --surface: #f8fafc;
    --surface-2: #f1f5f9;
    --border: #e2e8f0;
    --border-strong: #cbd5e1;
    --text: #0f172a;
    --text-2: #334155;
    --text-3: #64748b;
    --text-4: #94a3b8;
    --blue: #3b82f6;
    --blue-600: #2563eb;
    --blue-50: #eff6ff;
    --blue-100: #dbeafe;
    --green: #16a34a;
    --green-50: #f0fdf4;
    --amber: #f59e0b;
    --amber-50: #fffbeb;
    --red: #dc2626;
    --red-50: #fef2f2;
    --red-100: #fee2e2;
    --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.05);
    --shadow-pop: 0 4px 12px rgba(15, 23, 42, 0.06), 0 2px 4px rgba(15, 23, 42, 0.04);
    --radius: 8px;
    --radius-sm: 6px;
    --radius-lg: 12px;
    --font-en: 'Inter', system-ui, sans-serif;
    --font-jp: 'Noto Sans JP', 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-jp);
    color: var(--text);
    background: var(--bg);
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: 'palt' 1;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; color: inherit; }
  input, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 5px; border: 2px solid #fff; }
  ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

  /* ---------- layout shell ---------- */
  .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .sidebar {
    background: #fff;
    border-right: 1px solid var(--border);
    padding: 18px 12px 16px;
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .logo {
    display: flex; align-items: center; gap: 9px;
    padding: 6px 10px 18px;
  }
  .logo-mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
    display: grid; place-items: center;
    color: #fff; font-family: var(--font-en); font-weight: 700; font-size: 14px;
    box-shadow: 0 1px 2px rgba(37, 99, 235, 0.3), inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .logo-name { font-family: var(--font-en); font-weight: 600; font-size: 14.5px; letter-spacing: -0.01em; color: var(--text); }
  .logo-name .ai { color: var(--text-3); font-weight: 500; margin-left: 4px; }

  .nav-section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-4);
    font-weight: 600;
    font-family: var(--font-en);
    padding: 14px 10px 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px;
    border-radius: 6px;
    color: var(--text-2);
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.12s;
    width: 100%;
    text-align: left;
    white-space: nowrap;
  }
  .nav-item:hover { background: var(--surface); }
  .nav-item.active { background: var(--surface-2); color: var(--text); }
  .nav-item .icon { color: var(--text-3); flex-shrink: 0; }
  .nav-item.active .icon { color: var(--text); }
  .nav-spacer { flex: 1; }
  .profile {
    border-top: 1px solid var(--border);
    margin: 0 -12px;
    padding: 10px 14px 4px;
    display: flex; align-items: center; gap: 10px;
  }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #fda4af, #e11d48);
    color: #fff;
    display: grid; place-items: center;
    font-family: var(--font-en); font-weight: 600; font-size: 12px;
    flex-shrink: 0;
  }
  .profile-meta { min-width: 0; flex: 1; line-height: 1.25; }
  .profile-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .profile-role { font-size: 11.5px; color: var(--text-3); }
  .profile-menu { color: var(--text-4); padding: 4px; border-radius: 4px; }
  .profile-menu:hover { background: var(--surface); color: var(--text-2); }

  /* ---------- main area ---------- */
  .main { display: flex; flex-direction: column; min-width: 0; }
  .header {
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: #fff;
    display: flex; align-items: center;
    padding: 0 28px;
    gap: 16px;
    position: sticky; top: 0; z-index: 5;
  }
  .crumbs { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text-3); flex: 1; min-width: 0; }
  .crumb { color: var(--text-3); }
  .crumb:hover { color: var(--text); }
  .crumb.current { color: var(--text); font-weight: 500; }
  .crumb-sep { color: var(--text-4); }

  .lang-toggle {
    display: inline-flex;
    background: var(--surface-2);
    border-radius: 999px;
    padding: 3px;
    border: 1px solid var(--border);
  }
  .lang-toggle button {
    padding: 4px 12px;
    font-size: 12.5px;
    font-weight: 500;
    border-radius: 999px;
    color: var(--text-3);
    transition: all 0.12s;
    font-family: var(--font-en);
  }
  .lang-toggle button.jp { font-family: var(--font-jp); }
  .lang-toggle button.active {
    background: var(--blue);
    color: #fff;
    box-shadow: 0 1px 2px rgba(37, 99, 235, 0.3);
  }

  .header-icon-btn {
    width: 32px; height: 32px;
    border-radius: 6px;
    display: grid; place-items: center;
    color: var(--text-3);
    position: relative;
  }
  .header-icon-btn:hover { background: var(--surface); color: var(--text); }
  .header-icon-btn .dot {
    position: absolute; top: 6px; right: 7px;
    width: 7px; height: 7px;
    background: var(--blue);
    border-radius: 50%;
    border: 1.5px solid #fff;
  }
  .header-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #fda4af, #e11d48);
    color: #fff;
    display: grid; place-items: center;
    font-family: var(--font-en); font-weight: 600; font-size: 12px;
  }

  /* ---------- content ---------- */
  .content {
    max-width: 1280px;
    width: 100%;
    margin: 0 auto;
    padding: 28px 32px 64px;
  }

  /* page banner (processing state) */
  .banner {
    display: flex; align-items: center; gap: 12px;
    background: var(--blue-50);
    border: 1px solid #bfdbfe;
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #1e3a8a;
    position: relative;
    overflow: hidden;
  }
  .banner .spinner {
    width: 14px; height: 14px;
    border: 2px solid #bfdbfe;
    border-top-color: var(--blue-600);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .banner-progress {
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: #bfdbfe;
  }
  .banner-progress::after {
    content: ''; position: absolute; top: 0; left: 0; height: 100%;
    width: 40%; background: var(--blue-600);
    animation: progress 2.4s ease-in-out infinite;
  }
  @keyframes progress {
    0%   { left: -40%; }
    100% { left: 100%; }
  }

  /* page title */
  .page-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 24px;
    margin-bottom: 20px;
  }
  .page-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.25;
    letter-spacing: -0.005em;
    margin: 0 0 6px;
  }
  .page-title .romaji {
    font-family: var(--font-en);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-3);
    margin-left: 10px;
    letter-spacing: 0;
  }
  .page-sub {
    display: flex; align-items: center; gap: 14px;
    font-size: 13px;
    color: var(--text-3);
    line-height: 1.5;
    flex-wrap: wrap;
  }
  .page-sub-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-4); }
  .tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text-2);
  }
  .tag-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

  .head-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text-2);
    transition: all 0.1s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface); border-color: var(--border-strong); color: var(--text); }
  .btn.primary {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
    box-shadow: 0 1px 2px rgba(37, 99, 235, 0.25);
  }
  .btn.primary:hover { background: var(--blue-600); border-color: var(--blue-600); }
  .btn.icon-only { padding: 7px; }

  /* tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .tab {
    padding: 11px 16px 12px;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text-3);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.1s, border-color 0.1s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--blue); font-weight: 600; }
  .tab-count {
    font-family: var(--font-en);
    font-size: 11.5px;
    color: var(--text-3);
    background: var(--surface-2);
    padding: 1px 6px;
    border-radius: 999px;
    font-weight: 500;
  }
  .tab.active .tab-count { background: var(--blue-50); color: var(--blue-600); }

  /* ---------- brand voice 3-column grid ---------- */
  .voice-grid {
    display: grid;
    grid-template-columns: minmax(0, 40fr) minmax(0, 35fr) minmax(0, 25fr);
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 1200px) {
    .voice-grid { grid-template-columns: 1fr; }
  }

  .col-head { margin-bottom: 12px; }
  .col-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    letter-spacing: -0.003em;
  }
  .col-title .en { font-family: var(--font-en); font-size: 12px; color: var(--text-3); font-weight: 500; }
  .col-title-actions { margin-left: auto; }
  .col-helper { font-size: 12.5px; color: var(--text-3); margin-top: 4px; line-height: 1.55; }
  .col-helper.nowrap { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ---------- left col: sample library ---------- */
  .dropzone {
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 24px 18px;
    text-align: center;
    transition: all 0.15s;
    cursor: pointer;
    margin-bottom: 14px;
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--blue);
    background: var(--blue-50);
    border-style: solid;
  }
  .dropzone .drop-icon {
    color: var(--text-3);
    margin-bottom: 8px;
    display: inline-block;
  }
  .dropzone.drag-over .drop-icon, .dropzone:hover .drop-icon { color: var(--blue); }
  .dropzone .drop-primary {
    font-size: 13px; font-weight: 500; color: var(--text);
    margin-bottom: 3px;
  }
  .dropzone .drop-primary .blue { color: var(--blue); }
  .dropzone .drop-meta {
    font-size: 11.5px; color: var(--text-3);
    font-family: var(--font-en);
  }

  .sample-list {
    display: flex; flex-direction: column;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: #fff;
  }
  .sample-row {
    display: grid;
    grid-template-columns: 24px 1fr auto 24px;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12.5px;
    transition: background 0.08s;
    position: relative;
  }
  .sample-row:last-child { border-bottom: none; }
  .sample-row:hover { background: var(--surface); }
  .sample-row .file-icon { color: #94a3b8; }
  .sample-row .fname {
    font-weight: 500; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    line-height: 1.35;
  }
  .sample-row .fmeta {
    font-size: 11px; color: var(--text-3);
    font-family: var(--font-en);
    margin-top: 1px;
  }
  .sample-row .fcontent { min-width: 0; }
  .sample-row .fsize {
    font-family: var(--font-en);
    font-size: 11.5px;
    color: var(--text-3);
    white-space: nowrap;
  }
  .sample-row .fx {
    width: 22px; height: 22px;
    border-radius: 4px;
    display: grid; place-items: center;
    color: var(--text-4);
    opacity: 0;
    transition: opacity 0.1s, color 0.1s, background 0.1s;
  }
  .sample-row:hover .fx { opacity: 1; }
  .sample-row .fx:hover { background: var(--red-50); color: var(--red); }

  .counter-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-3);
  }
  .counter-row .count-num { font-family: var(--font-en); font-weight: 600; color: var(--text); }
  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--surface-2);
    border-radius: 2px;
    overflow: hidden;
    margin: 0 12px;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ---------- middle col: voice profile ---------- */
  .voice-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .voice-section {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    position: relative;
    transition: background 0.1s;
  }
  .voice-section:last-child { border-bottom: none; }
  .voice-section:hover { background: #fcfdff; }
  .voice-section:hover .vs-edit { opacity: 1; }
  .vs-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 11.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-3);
    margin-bottom: 9px;
    font-family: var(--font-en);
  }
  .vs-label .jp { font-family: var(--font-jp); letter-spacing: 0.02em; text-transform: none; color: var(--text-2); font-size: 12px; }
  .vs-edit {
    position: absolute; top: 14px; right: 14px;
    width: 22px; height: 22px;
    border-radius: 4px;
    display: grid; place-items: center;
    color: var(--text-3);
    opacity: 0;
    transition: opacity 0.12s, background 0.1s, color 0.1s;
  }
  .vs-edit:hover { background: var(--surface-2); color: var(--text); }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    background: var(--surface-2);
    color: var(--text-2);
    border: 1px solid transparent;
    line-height: 1.5;
    white-space: nowrap;
  }
  .chip.strong { background: var(--blue-50); color: #1e40af; border-color: #bfdbfe; }
  .chip.warn { background: var(--red-50); color: #991b1b; border-color: #fecaca; }
  .chip.warn::before {
    content: ''; width: 5px; height: 5px; border-radius: 50%;
    background: var(--red); display: inline-block;
  }

  .vs-paragraph {
    font-size: 13px;
    line-height: 1.75;
    color: var(--text-2);
    margin: 0;
  }
  .vs-paragraph + .vs-paragraph { margin-top: 8px; }

  .phrase-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 7px; }
  .phrase-list li {
    font-size: 13px;
    color: var(--text);
    padding: 7px 12px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    border-left: 2px solid var(--border-strong);
    line-height: 1.55;
  }

  .length-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
  }
  .length-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-3);
    padding: 6px 0 8px;
    border-bottom: 1px solid var(--border);
  }
  .length-table td {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    color: var(--text-2);
  }
  .length-table tr:last-child td { border-bottom: none; }
  .length-table td.num { font-family: var(--font-en); text-align: right; color: var(--text); font-weight: 500; }

  /* ---------- right col: guidelines ---------- */
  .guidelines-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .guidelines-list {
    max-height: 660px;
    overflow-y: auto;
    padding: 4px 0;
  }
  .guideline {
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
    transition: background 0.1s;
  }
  .guideline:last-child { border-bottom: none; }
  .guideline:hover { background: #fcfdff; }
  .guideline:hover .gl-edit { opacity: 1; }
  .gl-text {
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--text);
    margin: 0 0 6px;
    padding-right: 18px;
  }
  .guideline.faded .gl-text { color: var(--text-3); }
  .gl-meta {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px;
    color: var(--text-3);
    line-height: 1.4;
    flex-wrap: wrap;
  }
  .gl-meta .src {
    background: var(--surface-2);
    padding: 1px 6px;
    border-radius: 3px;
    color: var(--text-2);
    font-weight: 500;
  }
  .gl-meta .date { font-family: var(--font-en); }
  .gl-edit {
    position: absolute; top: 12px; right: 12px;
    width: 22px; height: 22px;
    border-radius: 4px;
    display: grid; place-items: center;
    color: var(--text-4);
    opacity: 0;
    transition: opacity 0.12s, color 0.1s, background 0.1s;
  }
  .gl-edit:hover { background: var(--surface-2); color: var(--text-2); }

  .guidelines-footer {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    font-size: 11.5px;
    color: var(--text-3);
    display: flex; align-items: center; gap: 6px;
  }

  /* skeleton */
  .skeleton {
    background: linear-gradient(90deg, #f1f5f9 0%, #e2e8f0 50%, #f1f5f9 100%);
    background-size: 200% 100%;
    animation: shimmer 1.6s linear infinite;
    border-radius: 4px;
  }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  .skel-line { height: 10px; margin-bottom: 8px; }
  .skel-chip { height: 22px; width: 64px; border-radius: 999px; display: inline-block; margin: 0 6px 6px 0; }
  .skel-empty-msg {
    text-align: center;
    font-size: 12.5px;
    color: var(--text-3);
    padding: 20px 16px 4px;
    line-height: 1.6;
  }

  /* empty state full-width dropzone */
  .empty-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
  .dropzone-large {
    padding: 60px 24px;
    border-width: 2px;
  }
  .dropzone-large .drop-primary { font-size: 15px; margin-bottom: 6px; }
  .dropzone-large .drop-icon { transform: scale(1.6); margin-bottom: 16px; }
  .empty-hint {
    text-align: center;
    color: var(--text-3);
    font-size: 13px;
    margin-top: 12px;
    line-height: 1.7;
  }
</style>
</head>
