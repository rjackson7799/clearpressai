<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Private internal tool with a public /f/ feedback surface — keep it out
         of search indexes. -->
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="ClearPress AI — internal PR content platform." />
    <title>ClearPress AI</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- This app registers no service worker; a pre-launch deployment left one
         on some devices, serving a stale app. Unregister anything found. -->
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .getRegistrations()
          .then(function (regs) {
            regs.forEach(function (reg) {
              reg.unregister();
            });
          })
          .catch(function () {});
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
